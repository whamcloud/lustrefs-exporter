name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      versionName:
        description: "Release version"
        required: true
      isDraft:
        description: "Draft release"
        required: false
        default: "true"

defaults:
  run:
    shell: bash -eux {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_rocky8_rpms:
    name: Build Rockylinux 8 RPMs
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y gcc make rpm-build

      - name: Install latest rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          default: true
          override: true

      - name: Build
        run: make rpm

      - name: Summary
        run: |
          find lustrefs-exporter/_rpm -type f -name \*.rpm -print -exec rpm -qivlp {} \;

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rocky8_rpm
          retention-days: 1
          path: lustrefs-exporter/_rpm/RPMS/**/*.rpm

  build_rocky9_rpms:
    name: Build Rockylinux 9 RPMs
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9.2-ubi
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y gcc make rpm-build

      - name: Install latest rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: make rpm

      - name: Summary
        run: |
          find lustrefs-exporter/_rpm -type f -name \*.rpm -print -exec rpm -qivlp {} \;

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rocky9_rpm
          retention-days: 1
          path: lustrefs-exporter/_rpm/RPMS/**/*.rpm

  build_rocky10_rpms:
    name: Build Rockylinux 10 RPMs
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:10
      #workaround, rocky10 by default not initializing PATH
      env:
        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc make rpm-build systemd-rpm-macros

      - name: Install latest rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: make rpm

      - name: Summary
        run: |
          find lustrefs-exporter/_rpm -type f -name \*.rpm -print -exec rpm -qivlp {} \;

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rocky10_rpm
          retention-days: 1
          path: lustrefs-exporter/_rpm/RPMS/**/*.rpm

  build_ubuntu20_debs:
    name: Build Ubuntu 20.04 DEBs
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y curl fakeroot
          cd lustrefs-exporter
          apt-get build-dep -y .

      - name: Install latest rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          default: true
          override: true

      - name: Build
        run: make deb

      - name: Summary
        run: |
          find lustrefs-exporter/_deb -type f -name \*.deb -print -exec dpkg -I {} \; -exec dpkg -c {} \;

      - name: Upload DEBs
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu20_debs
          retention-days: 1
          path: lustrefs-exporter/_deb/*.deb

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Release
    needs: [build_rocky8_rpms, build_rocky9_rpms, build_rocky10_rpms, build_ubuntu20_debs]
    runs-on: ubuntu-latest
    steps:
      - name: Download Rockylinux 8 RPMs
        uses: actions/download-artifact@v4
        with:
          name: rocky8_rpm

      - name: Download Rockylinux 9 RPMs
        uses: actions/download-artifact@v4
        with:
          name: rocky9_rpm

      - name: Download Rockylinux 10 RPMs
        uses: actions/download-artifact@v4
        with:
          name: rocky10_rpm

      - name: Download Ubuntu 20.04 DEBs
        uses: actions/download-artifact@v4
        with:
          name: ubuntu20_debs

      - name: Summary
        run: find -ls

      - name: Publish
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.versionName }}
          draft: ${{ github.event.inputs.isDraft }}
          files: |
            **/*.rpm
            **/*.deb
